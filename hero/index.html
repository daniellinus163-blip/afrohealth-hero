<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AfroHealth — Hero preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="afrohealth-hero.css" />
    <style>
      .afh-hero .afh-hero__image {
        background-image: url("assets/hero-bg.png");
      }
    </style>
  </head>
  <body style="margin: 0; background: #e8f6ef">
    <!--
      Shopify: comma-separated MP4 URLs in section "Video URLs", fallback image in theme.
      Replace # below with your product or signup URL.
    -->
    <section class="afh-hero" aria-label="Hero">
      <!-- Full loop ~42s: Lifestyle 8s → Community 7s → Nature 8s → Progress 6s → Expert 7s → Quick 6s -->
      <script type="application/json" class="afh-hero__video-config">
        [
          { "url": "https://videos.pexels.com/video-files/6697869/6697869-hd_1920_1080_25fps.mp4", "hold": 2700, "label": "Lifestyle — jogging" },
          { "url": "https://videos.pexels.com/video-files/3209828/3209828-hd_1920_1080_25fps.mp4", "hold": 2700, "label": "Lifestyle — yoga" },
          { "url": "https://videos.pexels.com/video-files/3196394/3196394-hd_1920_1080_25fps.mp4", "hold": 2600, "label": "Lifestyle — healthy food / prep" },
          { "url": "https://videos.pexels.com/video-files/3044294/3044294-hd_1920_1080_30fps.mp4", "hold": 3500, "label": "Community — group exercise" },
          { "url": "https://videos.pexels.com/video-files/5311089/5311089-hd_1920_1080_30fps.mp4", "hold": 3500, "label": "Community — people outdoors / energy" },
          { "url": "https://videos.pexels.com/video-files/2495382/2495382-hd_1920_1080_30fps.mp4", "hold": 2700, "label": "Nature — flowing water" },
          { "url": "https://videos.pexels.com/video-files/3045163/3045163-hd_1920_1080_30fps.mp4", "hold": 2700, "label": "Nature — greens / sunlight" },
          { "url": "https://videos.pexels.com/video-files/4121350/4121350-hd_1920_1080_25fps.mp4", "hold": 2600, "label": "Nature — calm / meditation mood" },
          { "url": "https://videos.pexels.com/video-files/4763824/4763824-hd_1920_1080_30fps.mp4", "hold": 3000, "label": "Transformation — stretching" },
          { "url": "https://videos.pexels.com/video-files/6388431/6388431-hd_1920_1080_25fps.mp4", "hold": 3000, "label": "Transformation — fitness / training" },
          { "url": "https://videos.pexels.com/video-files/5791775/5791775-hd_1920_1080_25fps.mp4", "hold": 2500, "label": "Expert — kitchen / food prep" },
          { "url": "https://videos.pexels.com/video-files/3775608/3775608-hd_1920_1080_25fps.mp4", "hold": 2500, "label": "Expert — trainer / movement" },
          { "url": "https://videos.pexels.com/video-files/7087300/7087300-hd_1920_1080_30fps.mp4", "hold": 2000, "label": "Expert — wellness / clinical mood" },
          { "url": "https://videos.pexels.com/video-files/6212624/6212624-hd_1920_1080_25fps.mp4", "hold": 2000, "label": "Quick — pour / drink" },
          { "url": "https://videos.pexels.com/video-files/4052891/4052891-hd_1920_1080_25fps.mp4", "hold": 2000, "label": "Quick — morning stretch" },
          { "url": "https://videos.pexels.com/video-files/5311089/5311089-hd_1920_1080_30fps.mp4", "hold": 2000, "label": "Quick — outdoors / smiling energy" }
        ]
      </script>

      <div class="afh-hero__media">
        <div class="afh-hero__image" role="img" aria-hidden="true"></div>
        <div class="afh-hero__video-wrap" aria-hidden="true">
          <div class="afh-hero__video-layer is-active">
            <video
              class="afh-hero__video"
              muted
              loop
              playsinline
              preload="metadata"
              poster="assets/hero-bg.png"
            ></video>
          </div>
          <div class="afh-hero__video-layer">
            <video
              class="afh-hero__video"
              muted
              loop
              playsinline
              preload="none"
              poster="assets/hero-bg.png"
            ></video>
          </div>
        </div>
        <div class="afh-hero__scrim" aria-hidden="true"></div>
        <div class="afh-hero__vignette" aria-hidden="true"></div>
        <div class="afh-hero__grain" aria-hidden="true"></div>
      </div>

      <div class="afh-hero__inner">
        <div class="afh-hero__content">
          <p class="afh-hero__eyebrow" data-afh-animate="1">
            Co-created by leading nutrition experts
          </p>
          <h1 class="afh-hero__headline" data-afh-animate="2">
            You’ve Been Running At 80%.<br />
            Here’s <span class="afh-hero__accent">The Other 20%.</span>
          </h1>
          <p class="afh-hero__sub" data-afh-animate="3">
            A daily greens drink co-created by leading nutrition experts to give you that extra
            20% in one daily scoop.
          </p>

          <div class="afh-hero__trust" data-afh-animate="4">
            <div class="afh-hero__trust-row">
              <span class="afh-hero__stars" aria-label="4.7 out of 5 stars">★★★★★</span>
              <span class="afh-hero__trust-text">4.7 verified reviews</span>
            </div>
            <span class="afh-hero__trust-sep" aria-hidden="true"></span>
            <span class="afh-hero__trust-pill">Melanin-Optimised</span>
            <span class="afh-hero__trust-sep" aria-hidden="true"></span>
            <span class="afh-hero__trust-pill">Nutritionist-Formulated</span>
          </div>

          <a class="afh-hero__cta" href="#" data-afh-animate="5">
            Claim your 20%
            <span class="afh-hero__cta-icon" aria-hidden="true">→</span>
          </a>
        </div>
      </div>
    </section>

    <script src="afrohealth-hero.js" defer></script>
  </body>
</html>
