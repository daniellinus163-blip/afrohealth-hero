<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AfroHealth — Hero preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="afrohealth-hero.css" />
  </head>
  <body style="margin: 0; background: #c49d81">
    <section class="afh-hero afh-hero--photo-bg" aria-label="Hero">
      <div class="afh-hero__main">
        <div class="afh-hero__media" aria-hidden="true">
          <img class="afh-hero__bg-image" src="assets/hero-inspired-bg.png" alt="" width="1920" height="1080" loading="eager" decoding="async" />
          <div class="afh-hero__media-scrim"></div>
        </div>
        <div class="afh-hero__inner">
          <div class="afh-hero__content">
            <p class="afh-hero__eyebrow" data-afh-animate="1">Co-created by leading nutrition experts</p>
            <h1 class="afh-hero__headline" data-afh-animate="2">
              You’ve Been Running At 80%.<br />
              Here’s <span class="afh-hero__accent">The Other 20%.</span>
            </h1>
            <p class="afh-hero__sub" data-afh-animate="3">
              A daily greens drink co-created by leading nutrition experts to give you that extra
              20% in one daily scoop.
            </p>
            <div class="afh-hero__trust" data-afh-animate="4">
              <div class="afh-hero__trust-row">
                <span class="afh-hero__stars" aria-label="4.7 out of 5 stars">★★★★★</span>
                <span class="afh-hero__trust-text">4.7 verified reviews</span>
              </div>
              <span class="afh-hero__trust-sep" aria-hidden="true"></span>
              <span class="afh-hero__trust-pill">Melanin-Optimised</span>
              <span class="afh-hero__trust-sep" aria-hidden="true"></span>
              <span class="afh-hero__trust-pill afh-hero__trust-pill--blue">Nutritionist-Formulated</span>
            </div>
            <a class="afh-hero__cta afh-hero__cta--outline" href="#" data-afh-animate="5">
              Claim your 20%
              <span class="afh-hero__cta-icon" aria-hidden="true">→</span>
            </a>
          </div>
        </div>
      </div>
    </section>
    <script src="afrohealth-hero.js" defer></script>
  </body>
</html>
